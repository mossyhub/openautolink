name: Release APK

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          mkdir -p secrets
          echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > secrets/upload-key.jks

      - name: Build release APK
        env:
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_KEY_PASSWORD: ${{ secrets.UPLOAD_KEY_PASSWORD }}
          UPLOAD_STORE_PASSWORD: ${{ secrets.UPLOAD_STORE_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease -Dorg.gradle.java.home=$JAVA_HOME

      - name: Rename APK
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mv app/build/outputs/apk/release/app-release.apk "app/build/outputs/apk/release/openautolink-${TAG}.apk"

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/openautolink-*.apk

      - name: Extract version info
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION_NAME="${TAG#v}"
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | grep -oP '\d+')
          CHANGELOG="${{ github.event.release.body }}"
          # Escape for JSON
          CHANGELOG_ESCAPED=$(echo "$CHANGELOG" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read().strip()))')
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "changelog=$CHANGELOG_ESCAPED" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update gh-pages with new manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save build artifacts path, clean working tree for branch switch
          cp -r app/build/outputs/apk/release /tmp/apk-release
          git stash --include-untracked || true

          # Fetch gh-pages
          git fetch origin gh-pages:gh-pages 2>/dev/null || true

          # Switch to gh-pages (create if needed)
          if git show-ref --verify --quiet refs/heads/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
            echo "# OpenAutoLink Updates" > index.html
          fi

          # Create releases dir
          mkdir -p releases

          # Copy APK
          TAG="${{ steps.version.outputs.tag }}"
          cp "app/build/outputs/apk/release/openautolink-${TAG}.apk" "releases/" 2>/dev/null || true

          # Write update.json
          cat > update.json << EOF
          {
            "latest_version_code": ${{ steps.version.outputs.version_code }},
            "latest_version_name": "${{ steps.version.outputs.version_name }}",
            "apk_url": "https://github.com/mossyhub/openautolink/releases/download/${{ steps.version.outputs.tag }}/openautolink-${{ steps.version.outputs.tag }}.apk",
            "changelog": ${{ steps.version.outputs.changelog }},
            "min_android_sdk": 32
          }
          EOF

          git add update.json index.html
          git commit -m "Update manifest for ${{ steps.version.outputs.tag }}" || echo "No changes"
          git push origin gh-pages
